<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gelir & Gider Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; background: #0a0a0a; }
  body { overflow-x: hidden; color: #f0ede8; }
  input, select { outline: none; border: none; background: none; color: #f0ede8; }
  ::-webkit-scrollbar { display: none; }
  .card { background: #1a1a1a; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .btn { cursor: pointer; border: none; font-family: 'Nunito', sans-serif; font-weight: 700; transition: all 0.15s; }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .slide-up { animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .chip { display:inline-flex; align-items:center; padding:6px 14px; border-radius:50px; font-size:13px; font-weight:700; cursor:pointer; transition: all 0.15s; }
  .chip:active { transform: scale(0.95); }
  .tx-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:16px; cursor:pointer; transition: background 0.15s; }
  .tx-row:active { background: #222222; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:8px 20px; font-family:'Nunito',sans-serif; transition: all 0.15s; }
  .nav-btn:active { transform: scale(0.9); }
  .input-field { width:100%; background:#222222; border-radius:14px; padding:14px 16px; color:#f0ede8; font-family:'Nunito',sans-serif; font-size:16px; font-weight:600; margin-bottom:12px; }
  .input-field:focus { outline: 2px solid #7c3aed; }
  select.input-field option { background: #1a1a1a; color: #f0ede8; }
  .progress-bar { height:7px; background:#2a2a2a; border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; transition: width 0.6s ease; }
  .aud-badge { display:inline-flex; align-items:center; gap:3px; background:#0e2233; border:1px solid #1a4060; border-radius:8px; padding:2px 7px; font-size:11px; font-family:'Space Mono',monospace; color:#5bc4f5; font-weight:700; }
  .rate-bar { display:flex; align-items:center; gap:8px; padding:8px 16px; background:#1a1a1a; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,0.3); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; display:inline-block; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; }
  .modal-content { background:#1a1a1a; border-radius:24px 24px 0 0; width:100%; padding:24px 20px 40px; animation: slideUp 0.25s ease; max-height:85vh; overflow-y:auto; }
  .person-avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; flex-shrink:0; }
  .person-card-clickable { border-radius:18px; padding:16px; cursor:pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .person-card-clickable:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const PEOPLE = ["Erdal", "A.A", "N.A"];

const PC = {
  "Erdal": { bg:"#f4f6fb", accent:"#1a1a2e", avatar:"#e2e6f0", avatarText:"#1a1a2e", barColor:"#1a1a2e" },
  "A.A":   { bg:"#f4f6fb", accent:"#1a1a2e", avatar:"#e2e6f0", avatarText:"#1a1a2e", barColor:"#1a1a2e" },
  "N.A":   { bg:"#f4f6fb", accent:"#1a1a2e", avatar:"#e2e6f0", avatarText:"#1a1a2e", barColor:"#1a1a2e" },
};

const formatTRY = (n) => new Intl.NumberFormat("tr-TR", { style:"currency", currency:"TRY", maximumFractionDigits:0 }).format(n);
const formatAUD = (n) => new Intl.NumberFormat("en-AU", { style:"currency", currency:"AUD", maximumFractionDigits:2 }).format(n);
const formatDate = (d) => new Date(d).toLocaleDateString("tr-TR", { day:"2-digit", month:"short" });

const SAMPLE = [
  { id:1, type:"income",  person:"Erdal", amount:15000, note:"Mart maaşı",        date:"2026-03-01" },
  { id:2, type:"expense", person:"Erdal", amount:3500,  note:"Kira",              date:"2026-03-03" },
  { id:3, type:"expense", person:"A.A",   amount:850,   note:"Market alışverişi", date:"2026-03-05" },
  { id:4, type:"income",  person:"A.A",   amount:2200,  note:"Freelance proje",   date:"2026-03-07" },
  { id:5, type:"expense", person:"N.A",   amount:320,   note:"Ulaşım",            date:"2026-03-08" },
  { id:6, type:"income",  person:"N.A",   amount:5000,  note:"Maaş",              date:"2026-03-09" },
];

function DonutChart({ income, expense, color }) {
  const total = income + expense || 1;
  const incPct = (income / total) * 100;
  const expPct = (expense / total) * 100;
  const r = 42, cx = 56, cy = 56, circ = 2 * Math.PI * r;
  const incDash = (incPct / 100) * circ;
  const expDash = (expPct / 100) * circ;
  return (
    <svg width="112" height="112" viewBox="0 0 112 112">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e8eaf0" strokeWidth="14"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#34d399" strokeWidth="14"
        strokeDasharray={`${incDash} ${circ - incDash}`}
        strokeDashoffset={circ * 0.25} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f87171" strokeWidth="14"
        strokeDasharray={`${expDash} ${circ - expDash}`}
        strokeDashoffset={circ * 0.25 - incDash} strokeLinecap="round"/>
    </svg>
  );
}

function App() {
  const [txs, setTxs] = useState(() => {
    try { const s = localStorage.getItem("txs_v2"); return s ? JSON.parse(s) : SAMPLE; } catch { return SAMPLE; }
  });
  const [rate, setRate]       = useState(0.032);
  const [rateLoading, setRL]  = useState(true);
  const [rateErr, setRE]      = useState(false);
  const [rateTime, setRT]     = useState("");
  const [view, setView]       = useState("home");  // home | add | person | month
  const [filter, setFilter]   = useState("all");
  const [monthFilter, setMonthFilter] = useState("all");
  const [personFilter, setPersonFilter] = useState("all");
  const [editTx, setEditTx]   = useState(null);
  const [detailTx, setDetailTx] = useState(null);
  const [activePerson, setActivePerson] = useState(null);
  const [personTxFilter, setPersonTxFilter] = useState("all");
  const [personSearch, setPersonSearch] = useState("");

  const blank = { type:"expense", person:"Erdal", amount:"", note:"", date:new Date().toISOString().split("T")[0] };
  const [form, setForm] = useState(blank);

  useEffect(() => {
    try { localStorage.setItem("txs_v2", JSON.stringify(txs)); } catch {}
  }, [txs]);

  const fetchRate = useCallback(async () => {
    setRL(true); setRE(false);
    try {
      const r = await fetch("https://api.frankfurter.app/latest?from=TRY&to=AUD");
      const d = await r.json();
      if (d.rates?.AUD) { setRate(d.rates.AUD); setRT(new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})); }
      else throw new Error();
    } catch { setRE(true); }
    finally { setRL(false); }
  }, []);

  useEffect(() => { fetchRate(); }, []);

  const toAUD = (n) => n * rate;

  const totalIncome  = txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const totalBalance = totalIncome - totalExpense;

  const personStats = PEOPLE.map(p => {
    const inc = txs.filter(t=>t.person===p && t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp = txs.filter(t=>t.person===p && t.type==="expense").reduce((s,t)=>s+t.amount,0);
    return { name:p, income:inc, expense:exp, balance:inc-exp };
  });

  const filtered = txs
    .filter(t => filter==="all" || t.type===filter)
    .filter(t => personFilter==="all" || t.person===personFilter)
    .sort((a,b) => new Date(b.date)-new Date(a.date));

  const openAdd  = () => { setForm(blank); setEditTx(null); setView("add"); };
  const openEdit = (t) => { setForm({type:t.type,person:t.person,amount:String(t.amount),note:t.note,date:t.date}); setEditTx(t); setDetailTx(null); setView("add"); };
  const removeTx = (id) => { setTxs(p=>p.filter(t=>t.id!==id)); setDetailTx(null); };
  const submit   = () => {
    if (!form.amount || !form.person) return;
    const tx = { ...form, amount: parseFloat(form.amount) };
    if (editTx) setTxs(p=>p.map(t=>t.id===editTx.id ? {...t,...tx} : t));
    else setTxs(p=>[...p,{...tx,id:Date.now()}]);
    setForm(blank); setEditTx(null); setView("home");
  };
  const goHome = () => { setView("home"); setEditTx(null); setForm(blank); setActivePerson(null); setMonthFilter("all"); };

  const exportData = () => {
    const json = JSON.stringify(txs, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cuzdan-yedek.json"; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          setTxs(data);
          alert("✅ " + data.length + " kayıt başarıyla yüklendi!");
        } else { alert("❌ Geçersiz dosya!"); }
      } catch { alert("❌ Dosya okunamadı!"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const openPerson = (name) => {
    setActivePerson(name);
    setPersonTxFilter("all");
    setPersonSearch("");
    setView("person");
  };

  // Person detail page data
  const pStats = activePerson ? personStats.find(p=>p.name===activePerson) : null;
  const pTxs = activePerson
    ? txs.filter(t=>t.person===activePerson && (personTxFilter==="all" || t.type===personTxFilter))
        .filter(t=> personSearch.trim()==="" || (t.note||"").toLowerCase().includes(personSearch.toLowerCase()))
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
    : [];
  const pColor = activePerson ? PC[activePerson] : null;

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#f0ede8",fontFamily:"'Nunito',sans-serif",maxWidth:430,margin:"0 auto",position:"relative",paddingBottom:90}}>

      {/* ── HOME ── */}
      {view==="home" && <div className="slide-up">
        <div style={{padding:"52px 20px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontSize:12,color:"#888",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Mart 2026</div>
              <div style={{fontSize:26,fontWeight:900,color:"#f0ede8"}}>Aile Cüzdanı 💰</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button className="btn" onClick={exportData}
                style={{width:38,height:38,borderRadius:12,background:"#1a1a1a",color:"#5bc4f5",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}
                title="Yedek Al">💾</button>
              <label style={{width:38,height:38,borderRadius:12,background:"#1a1a1a",color:"#34d399",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}
                title="Yedek Yükle">
                📂<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
              </label>
            </div>
          </div>

          {/* Master Balance */}
          <div className="card" style={{padding:22,background:"linear-gradient(135deg,#1e1b4b,#2d1b69)",position:"relative",overflow:"hidden",marginBottom:12}}>
            <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:"rgba(167,139,250,0.1)"}}/>
            <div style={{fontSize:11,color:"#a78bfa",fontWeight:700,marginBottom:4,letterSpacing:1}}>TOPLAM BAKİYE</div>
            <div style={{fontSize:34,fontWeight:900,fontFamily:"'Space Mono',monospace",color:totalBalance>=0?"#c4b5fd":"#ff6b6b"}}>
              {formatTRY(totalBalance)}
            </div>
            <div className="aud-badge" style={{marginTop:8,fontSize:13,padding:"4px 10px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#e0f0ff"}}>
              🇦🇺 {rateLoading?"...":formatAUD(toAUD(totalBalance))}
            </div>
            <div style={{display:"flex",gap:20,marginTop:18}}>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,marginBottom:2}}>TOPLAM GELİR</div>
                <div style={{fontSize:15,fontWeight:800,color:"#34d399"}}>{formatTRY(totalIncome)}</div>
                <div className="aud-badge" style={{marginTop:4,background:"rgba(255,255,255,0.08)",border:"none",color:"#a7f3d0"}}>🇦🇺 {formatAUD(toAUD(totalIncome))}</div>
              </div>
              <div style={{width:1,background:"rgba(255,255,255,0.1)"}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,marginBottom:2}}>TOPLAM GİDER</div>
                <div style={{fontSize:15,fontWeight:800,color:"#f87171"}}>{formatTRY(totalExpense)}</div>
                <div className="aud-badge" style={{marginTop:4,background:"rgba(255,255,255,0.08)",border:"none",color:"#fca5a5"}}>🇦🇺 {formatAUD(toAUD(totalExpense))}</div>
              </div>
            </div>
          </div>

          {/* Rate bar */}
          <div className="rate-bar" style={{marginBottom:0}}>
            <span style={{fontSize:14}}>🇦🇺</span>
            <span style={{fontSize:12,color:"#1a7abf",fontFamily:"'Space Mono',monospace",fontWeight:700}}>
              1 ₺ = {rateLoading?"...":"A$"+rate.toFixed(4)}
            </span>
            <span style={{fontSize:11,color:"#666",flex:1}}>{rateErr?"⚠️ Tahmini kur":rateTime?"Güncellendi "+rateTime:""}</span>
            <button className="btn" onClick={fetchRate} style={{fontSize:18,background:"none",color:"#1a7abf",padding:"2px 6px",borderRadius:8}}>
              <span className={rateLoading?"spinning":""}>↻</span>
            </button>
          </div>
        </div>

        {/* Person Cards — tıklanabilir */}
        <div style={{padding:"16px 20px"}}>
          <div style={{fontSize:12,fontWeight:800,color:"#888",marginBottom:10,letterSpacing:.5}}>KİŞİ BAZINDA ÖZET <span style={{fontWeight:600,color:"#666"}}>· detay için tıkla</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {personStats.map(p => {
              const c = PC[p.name];
              const savePct = p.income > 0 ? Math.max(0, Math.min(100, Math.round((p.balance/p.income)*100))) : 0;
              return (
                <div key={p.name} className="person-card-clickable" onClick={()=>openPerson(p.name)}
                  style={{background:"#1a1a1a", border:"1.5px solid #2a2a2a", boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div className="person-avatar" style={{width:42,height:42,background:"#2a2a2a",color:"#f0ede8",fontSize:17}}>
                      {p.name[0]}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:16,fontWeight:800,color:"#f0ede8"}}>{p.name}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:1}}>Tasarruf: {savePct}%</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:900,fontFamily:"'Space Mono',monospace",color:p.balance>=0?"#059669":"#dc2626"}}>
                        {formatTRY(p.balance)}
                      </div>
                      <div className="aud-badge" style={{marginTop:3}}>🇦🇺 {formatAUD(toAUD(p.balance))}</div>
                    </div>
                    <span style={{fontSize:16,color:"#666",marginLeft:4}}>›</span>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1,background:"#0d2018",borderRadius:12,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#888",fontWeight:700,marginBottom:2}}>GELİR</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#059669"}}>{formatTRY(p.income)}</div>
                      <div className="aud-badge" style={{marginTop:3,fontSize:10}}>🇦🇺 {formatAUD(toAUD(p.income))}</div>
                    </div>
                    <div style={{flex:1,background:"#200d0d",borderRadius:12,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#888",fontWeight:700,marginBottom:2}}>GİDER</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#dc2626"}}>{formatTRY(p.expense)}</div>
                      <div className="aud-badge" style={{marginTop:3,fontSize:10}}>🇦🇺 {formatAUD(toAUD(p.expense))}</div>
                    </div>
                  </div>
                  <div className="progress-bar" style={{marginTop:10}}>
                    <div className="progress-fill" style={{width:`${savePct}%`,background:"#059669"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Aylık Özet Butonu */}
        {(() => {
          const monthMap = {};
          txs.forEach(t => {
            const d = new Date(t.date);
            const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
            if (!monthMap[key]) monthMap[key] = { inc:0, exp:0 };
            if (t.type==="income") monthMap[key].inc += t.amount;
            else monthMap[key].exp += t.amount;
          });
          const months = Object.keys(monthMap).sort().reverse();
          if (months.length === 0) return null;
          const monthName = (key) => {
            const [y, m] = key.split("-");
            return new Date(y, m-1, 1).toLocaleDateString("tr-TR", { month:"long", year:"numeric" });
          };
          return (
            <div style={{padding:"0 20px 20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:800,color:"#888",letterSpacing:.5}}>AYLIK ÖZET</div>
              </div>
              <div className="card" style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:22}}>📅</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#f0ede8"}}>Ay seçerek özet görün</div>
                  <div style={{fontSize:11,color:"#777",marginTop:2}}>{months.length} ay kayıtlı</div>
                </div>
                <select
                  value=""
                  onChange={e => { if(e.target.value) { setMonthFilter(e.target.value); setView("month"); } }}
                  style={{background:"#7c3aed",border:"none",borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#ffffff",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}>
                  <option value="" disabled>Ay Seç ▾</option>
                  {months.map(k => (
                    <option key={k} value={k}>{monthName(k)}</option>
                  ))}
                </select>
              </div>
            </div>
          );
        })()}
      </div>}

      {/* ── AYLIK ÖZET SAYFASI ── */}
      {view==="month" && monthFilter && (() => {
        const monthName = (key) => {
          const [y, m] = key.split("-");
          return new Date(y, m-1, 1).toLocaleDateString("tr-TR", { month:"long", year:"numeric" });
        };
        const inc = txs.filter(t=>t.type==="income" && new Date(t.date).toISOString().slice(0,7)===monthFilter).reduce((s,t)=>s+t.amount,0);
        const exp = txs.filter(t=>t.type==="expense" && new Date(t.date).toISOString().slice(0,7)===monthFilter).reduce((s,t)=>s+t.amount,0);
        const bal = inc - exp;
        const maxVal = Math.max(inc, exp) || 1;
        return (
          <div className="slide-up" style={{paddingBottom:20}}>
            {/* Header */}
            <div style={{background:"#0a0a0a",padding:"52px 20px 24px",borderBottom:"2px solid #2a2a2a"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                <button className="btn" onClick={goHome}
                  style={{width:40,height:40,borderRadius:12,background:"#1a1a1a",color:"#f0ede8",fontSize:18,boxShadow:"0 1px 6px rgba(0,0,0,0.1)"}}>←</button>
                <div style={{fontSize:22,fontWeight:900,color:"#f0ede8"}}>📅 {monthName(monthFilter)}</div>
              </div>

              {/* Toplam bakiye */}
              <div className="card" style={{padding:18,background:"linear-gradient(135deg,#1e1b4b,#2d1b69)",marginBottom:0}}>
                <div style={{fontSize:11,color:"#a78bfa",fontWeight:700,marginBottom:4,letterSpacing:1}}>AY BAKİYESİ</div>
                <div style={{fontSize:30,fontWeight:900,fontFamily:"'Space Mono',monospace",color:bal>=0?"#34d399":"#f87171"}}>{formatTRY(bal)}</div>
                <div className="aud-badge" style={{marginTop:6,background:"rgba(255,255,255,0.1)",border:"none",color:"#e0f0ff"}}>🇦🇺 {formatAUD(toAUD(bal))}</div>
                <div style={{display:"flex",gap:16,marginTop:14}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,marginBottom:2}}>GELİR</div>

              if (t.type==="income") monthMap[key].inc += t.amount;
              else monthMap[key].exp += t.amount;

            if (months.length === 0) return null;

              const [y, m] = key.split("-");

                <div style={{fontSize:12,fontWeight:800,color:"#888",letterSpacing:.5,marginBottom:8}}>AYLIK ÖZET</div>

                    const maxVal = Math.max(inc, exp) || 1;
                    return (
                      <div key={key} style={{background:"#1a1a1a",borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 6px rgba(0,0,0,0.4)"}}>

      })()}

      {/* ── BOTTOM NAV ── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#1a1a1a",borderTop:"1px solid #2a2a2a",boxShadow:"0 -2px 12px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-around",padding:"8px 0 20px",zIndex:100}}>
        <button className="nav-btn" onClick={goHome}>
          <span style={{fontSize:20}}>🏠</span>
          <span style={{fontSize:10,fontWeight:700,color:(view==="home"||view==="person")?"#7c3aed":"#aaa"}}>Ana Sayfa</span>
        </button>
        <button className="nav-btn" onClick={openAdd} style={{position:"relative",top:-10}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 4px 20px rgba(124,58,237,0.5)"}}>+</div>
        </button>
        <button className="nav-btn" onClick={fetchRate}>
          <span style={{fontSize:20}} className={rateLoading?"spinning":""}>↻</span>
          <span style={{fontSize:10,fontWeight:700,color:"#777"}}>Kur Güncelle</span>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
